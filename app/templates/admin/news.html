{% extends 'admin/_layout.html' %}
{% block admin_content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
  <h1 style="font-style: italic;">Новости</h1>
  <a href="{{ url_for('admin.news_new') }}" class="btn btn-primary">+ Новая</a>
</div>
<div class="table-card">
  <table class="data">
    <thead><tr><th>Заголовок</th><th>Дата</th><th>Featured</th><th></th></tr></thead>
    <tbody>
      {% for n in items %}
      <tr>
        <td><strong>{{ n.title_ru }}</strong><br><small style="color: var(--color-text-muted);">{{ n.title_en }}</small></td>
        <td>{{ n.published_at.strftime('%d.%m.%Y') }}</td>
        <td>{% if n.is_featured %}<span class="badge accent">★</span>{% endif %}</td>
        <td>
          <a href="{{ url_for('admin.news_edit', news_id=n.id) }}" class="btn btn-outline btn-sm">Изм.</a>
          <form method="post" action="{{ url_for('admin.news_delete', news_id=n.id) }}" style="display: inline;" onsubmit="return confirm('Удалить?');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
            <button class="btn btn-danger btn-sm" type="submit">Удалить</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
