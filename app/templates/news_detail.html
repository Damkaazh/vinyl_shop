{% extends 'base.html' %}
{% block content %}
<section class="section">
  <div class="container-default">
    <div class="section-eyebrow">{{ t.news }} · {{ item.published_at.strftime('%d.%m.%Y') }}</div>
    <h1 style="font-style: italic; margin-top: var(--space-2);">{{ item.title(lang) }}</h1>
    <div style="margin-top: var(--space-6); aspect-ratio: 16/8; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-divider);">
      <img src="{{ url_for('static', filename='img/' + item.image) }}" alt="" style="width:100%; height:100%; object-fit:cover;">
    </div>
    <div style="margin-top: var(--space-6); white-space: pre-line; color: var(--color-text); font-size: var(--text-base);">{{ item.body(lang) }}</div>
    {% if current_user.is_authenticated %}
      <form method="post" action="{{ url_for('account.toggle_favorite') }}" style="margin-top: var(--space-6);">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
        <input type="hidden" name="news_id" value="{{ item.id }}">
        <button class="btn btn-outline btn-sm">♥ {{ t.add_to_favorites }}</button>
      </form>
    {% endif %}
  </div>
</section>
{% endblock %}
